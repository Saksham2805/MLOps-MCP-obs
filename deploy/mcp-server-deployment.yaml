# ──────────────────────────────────────────────────────────────────────────────
# MCP Server Deployment + ClusterIP Service
# Image: <YOUR_REGISTRY>/llm-obs-mcp-server:latest
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-obs-mcp-server
  namespace: llm-obs
  labels:
    app: llm-obs-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: llm-obs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-obs-mcp-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: llm-obs-mcp-server
        app.kubernetes.io/component: mcp-server
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      containers:
        - name: mcp-server
          image: <YOUR_REGISTRY>/llm-obs-mcp-server:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TIMESCALEDB_URL
              valueFrom:
                secretKeyRef:
                  name: llm-obs-secrets
                  key: TIMESCALEDB_URL
            - name: ALERTMANAGER_URL
              valueFrom:
                secretKeyRef:
                  name: llm-obs-secrets
                  key: ALERTMANAGER_URL
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8080"
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: llm-obs-mcp-server-svc
  namespace: llm-obs
  labels:
    app: llm-obs-mcp-server
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: llm-obs
spec:
  type: ClusterIP
  selector:
    app: llm-obs-mcp-server
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
